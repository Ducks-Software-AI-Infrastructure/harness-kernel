name: Bug report
description: Report behavior that is broken, unexpected, or inconsistent.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, API keys, private logs, or user data.

        If this is a security vulnerability, stop here and use the private security policy instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues first.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package or area
      multiple: true
      options:
        - "@harness-kernel/core"
        - "@harness-kernel/provider-openai"
        - "@harness-kernel/provider-ai-sdk"
        - "@harness-kernel/storage-file"
        - "@harness-kernel/sandbox-local"
        - "@harness-kernel/tools-node"
        - "@harness-kernel/logging-file"
        - "@harness-kernel/create"
        - Documentation site
        - Examples
        - Release or packaging
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit SHA, or npm dist-tag.
      placeholder: "0.1.1"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node.js, package manager, OS, and runtime host details.
      placeholder: |
        Node.js:
        pnpm/npm/yarn:
        OS:
        Runtime host:
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest code sample, repository, or command sequence that reproduces the issue.
      render: ts
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      description: Paste relevant logs only after removing secrets and private data.
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that helps explain the issue.
    validations:
      required: false
